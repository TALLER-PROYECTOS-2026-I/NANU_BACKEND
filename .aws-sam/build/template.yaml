AWSTemplateFormatVersion: '2010-09-09'
Description: nanu-backend
Transform:
- AWS::Serverless-2016-10-31
Resources:
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: '''GET,OPTIONS'''
        AllowHeaders: '''*'''
        AllowOrigin: '''*'''
  getAllItemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-all-items.getAllItemsHandler
      Runtime: nodejs20.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 30
      Environment:
        Variables:
          DB_HOST: database-demo.c56g84wquc58.us-east-2.rds.amazonaws.com
          DB_USER: postgres
          DB_PASS: Soporte1
          DB_NAME: postgres
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: MyApi
            Path: /items
            Method: GET
      CodeUri: getAllItemsFunction
    Metadata:
      SamResourceId: getAllItemsFunction
Outputs:
  WebEndpoint:
    Description: API Gateway endpoint URL for Prod stage
    Value:
      Fn::Sub: https://${MyApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/items
