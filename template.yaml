AWSTemplateFormatVersion: 2010-09-09
Description: nanu-backend

Transform:
  - AWS::Serverless-2016-10-31

# 🔥 VARIABLES GLOBALES (CLAVE PARA EQUIPO)
Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    MemorySize: 128
    Timeout: 30
    Environment:
      Variables:
        DB_HOST: "database-demo.c56g84wquc58.us-east-2.rds.amazonaws.com"
        DB_USER: "backend_user"
        DB_PASS: "Backend123!"
        DB_NAME: "postgres"

Resources:
  # 🌐 API GLOBAL
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'*'"
        AllowOrigin: "'*'"

  # 👇 EJEMPLO 1 (YA TIENES)
  getAllItemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-all-items.getAllItemsHandler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /items
            Method: GET

  # 👇 EJEMPLO 2 (NUEVO - equipo)
  #aun no existe el get camiones
  getCamionesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-camiones.getCamiones
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /camiones
            Method: GET

Outputs:
  WebEndpoint:
    Description: API base URL
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/items"
