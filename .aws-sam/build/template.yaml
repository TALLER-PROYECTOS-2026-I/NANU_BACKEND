AWSTemplateFormatVersion: '2010-09-09'
Description: nanu-backend
Transform:
- AWS::Serverless-2016-10-31
Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
    - x86_64
    MemorySize: 128
    Timeout: 30
    Environment:
      Variables:
        DB_HOST: database-demo.c56g84wquc58.us-east-2.rds.amazonaws.com
        DB_USER: backend_user
        DB_PASS: Backend123!
        DB_NAME: postgres
Resources:
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
        AllowHeaders: '''*'''
        AllowOrigin: '''*'''
  getAllItemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-all-items.getAllItemsHandler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: MyApi
            Path: /items
            Method: GET
      CodeUri: getAllItemsFunction
    Metadata:
      SamResourceId: getAllItemsFunction
  getCamionesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-camiones.getCamionesHandler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: MyApi
            Path: /camiones
            Method: GET
      CodeUri: getCamionesFunction
    Metadata:
      SamResourceId: getCamionesFunction
Outputs:
  WebEndpoint:
    Description: API base URL
    Value:
      Fn::Sub: https://${MyApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/items
